name = "venture-os-bot"
main = "src/index.ts"
compatibility_date = "2024-02-08"
account_id = "ef08ac9e9f7114e7f6926b8d2c17aac6"

[vars]
# TELEGRAM_BOT_TOKEN and NEBIUS_API_KEY are managed via GitHub Secrets

# Commented out until you create a KV namespace via: npx wrangler kv:namespace create KV
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-id"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "venture-artifacts"

[[durable_objects.bindings]]
name = "PROJECT_SESSION"
class_name = "ProjectSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProjectSession"]
